
# Deployment for rachid Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rachid-backend
  namespace: rachid
  labels:
    app.kubernetes.io/name: rachid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rachid
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rachid
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: rachid:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: rachid-config
            - secretRef:
                name: rachid-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: media-data
              mountPath: /app/media
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: media-data
          persistentVolumeClaim:
            claimName: rachid-media
      restartPolicy: Always

---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rachid-celery-worker
  namespace: rachid
  labels:
    app.kubernetes.io/name: rachid
    app.kubernetes.io/component: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rachid
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rachid
        app.kubernetes.io/component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: rachid:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: rachid-config
            - secretRef:
                name: rachid-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always

---
# Celery Beat Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rachid-celery-beat
  namespace: rachid
  labels:
    app.kubernetes.io/name: rachid
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rachid
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rachid
        app.kubernetes.io/component: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: rachid:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: rachid-config
            - secretRef:
                name: rachid-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      restartPolicy: Always
