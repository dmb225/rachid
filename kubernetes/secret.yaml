
# Secret for rachid
# WARNING: Replace placeholder values before deploying!
# Consider using external secrets management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: rachid-secrets
  namespace: rachid
  labels:
    app.kubernetes.io/name: rachid
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Auth (always enabled) — generate with: openssl rand -hex 32
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  API_KEY: "CHANGE_ME_IN_PRODUCTION"
  # PostgreSQL
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  # Redis
  REDIS_PASSWORD: ""
  LOGFIRE_TOKEN: ""

  # LLM API Keys
  OPENROUTER_API_KEY: ""
  # OAuth
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
