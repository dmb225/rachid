
# ConfigMap for rachid
apiVersion: v1
kind: ConfigMap
metadata:
  name: rachid-config
  namespace: rachid
  labels:
    app.kubernetes.io/name: rachid
    app.kubernetes.io/component: backend
data:
  # Application settings
  ENVIRONMENT: "production"
  DEBUG: "false"
  PROJECT_NAME: "rachid"
  API_V1_STR: "/api/v1"
  TIMEZONE: "UTC"
  # PostgreSQL settings
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "rachid"
  # Redis settings
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # Celery settings
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  # Logfire settings
  LOGFIRE_SERVICE_NAME: "rachid"
  LOGFIRE_ENVIRONMENT: "production"
  # CORS settings (adjust for your domain)
  CORS_ORIGINS: '["https://rachid.example.com"]'
